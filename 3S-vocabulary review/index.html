<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>教学合集 · 交互演示</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { display: flex; height: 100vh; font-family: system-ui, sans-serif; }

    nav {
      width: 240px; background: #f7f9fc; overflow-y: auto;
      border-right: 1px solid #ddd; padding: 1.2em 0.8em;
    }
    nav h2 { font-size: 1.2em; margin-bottom: 1em; color: #2c3e50; padding-left: 0.3em; }
    nav a {
      display: block; padding: 0.5em 0.8em; color: #1a0dab;
      text-decoration: none; border-radius: 6px; margin-bottom: 0.15em;
      font-size: 0.95em; transition: background 0.2s;
    }
    nav a:hover { background: #e2e8f0; }

    main { flex: 1; }
    iframe {
      width: 100%; height: 100%; border: none;
    }

    @media (max-width: 600px) {
      body { flex-direction: column; }
      nav { width: 100%; max-height: 35vh; border-right: none; border-bottom: 1px solid #ddd; }
    }
  </style>
</head>
<body>
  <nav>
    <h2>📖 交互内容目录</h2>
    <div id="toc"></div>
  </nav>
  <main>
    <!-- 加上 fullscreen 和各种权限，保证交互文件功能完整 -->
    <iframe id="viewer" src="" title="内容查看区" allow="fullscreen; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
  </main>

  <script>
    // 
    const pages = [
      { file: "1-15words.html", title: "3S vocabulary-1" },
      { file: "16-30words.html", title: "3S vocabulary-2" },
      { file: "31-45words.html", title: "3S vocabulary-3" },
      { file: "46-60words.html", title: "3S vocabulary-4" }
      // 继续添加...
    ];

    const toc = document.getElementById('toc');
    const viewer = document.getElementById('viewer');

    pages.forEach((page) => {
      const a = document.createElement('a');
      a.href = '#';
      a.textContent = page.title;
      a.onclick = (e) => {
        e.preventDefault();
        viewer.src = page.file;
      };
      toc.appendChild(a);
    });

    if (pages.length > 0) viewer.src = pages[0].file;
  </script>
</body>
</html>
